name: unzip
on:
  workflow_dispatch:
jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          unzip -o *.zip || true
          rm -f *.zip
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "unzip" || true
          git push
